services:
  - type: web
    name: service-backend
    runtime: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        fromDatabase:
          name: service-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: service-redis
          type: redis
          property: connectionString

  - type: redis
    name: service-redis
    region: frankfurt
    plan: free
    ipAllowList: []

databases:
  - name: service-db
    region: frankfurt
    plan: free